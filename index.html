<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>Start</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
      :root {
        --bg: #1a1a1a;
        --card: #252525;
        --fg: #e0e0e0;
        --muted: #666;
        --accent: #e5c07b;
        --accent-hover: #f0d98e;
        --border: #333;
        --danger: #e06c75;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 3rem 1rem;
      }

      .clock {
        font-family: "JetBrains Mono", monospace;
        font-size: 4rem;
        font-weight: 400;
        color: var(--fg);
        margin-bottom: 0.5rem;
      }

      .date {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
      }

      .weather {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .weather i {
        color: var(--accent);
      }

      .search-container {
        width: 100%;
        max-width: 500px;
        margin-bottom: 2.5rem;
      }

      .search-input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--fg);
        padding: 0.8rem 1rem;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .search-input::placeholder {
        color: var(--muted);
      }

      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
      }

      .tab {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 0.4rem 1rem;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .tab:hover {
        border-color: var(--muted);
        color: var(--fg);
      }

      .tab.active {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg);
      }

      .tab .remove {
        font-size: 0.7rem;
        opacity: 0.7;
        margin-left: 0.3rem;
      }

      .tab .remove:hover {
        opacity: 1;
        color: var(--danger);
      }

      .add-tab-btn {
        background: transparent;
        border: 1px dashed var(--border);
        color: var(--muted);
        padding: 0.4rem 0.8rem;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.2s;
      }

      .add-tab-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .bookmarks {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 1rem;
        width: 100%;
        max-width: 600px;
        position: relative;
      }

      .bookmark {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem;
        background: var(--card);
        border-radius: 10px;
        text-decoration: none;
        color: var(--fg);
        transition: all 0.2s;
        border: 1px solid transparent;
        position: relative;
      }

      .bookmark:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }

      .bookmark .remove {
        position: absolute;
        top: 4px;
        right: 4px;
        color: var(--muted);
        font-size: 0.8rem;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .bookmark .edit {
        position: absolute;
        top: 4px;
        right: 20px;
        color: var(--muted);
        font-size: 0.75rem;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .bookmark:hover .remove,
      .bookmark:hover .edit {
        opacity: 1;
      }

      .bookmark .remove:hover {
        color: var(--danger);
      }

      .bookmark .edit:hover {
        color: var(--accent);
      }

      .bookmark i {
        font-size: 1.8rem;
        color: var(--accent);
      }

      .bookmark span {
        font-size: 0.75rem;
        text-align: center;
        color: var(--muted);
      }

      .add-bookmark {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 1rem;
        background: transparent;
        border: 1px dashed var(--border);
        border-radius: 10px;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
        min-height: 85px;
      }

      .add-bookmark:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .add-bookmark i {
        font-size: 1.5rem;
      }

      .add-bookmark span {
        font-size: 0.75rem;
      }

      .timer-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 0.5rem 1rem;
        display: none;
        align-items: center;
        justify-content: space-between;
        z-index: 100;
      }

      .timer-bar.visible { display: flex; }

      .timer-bar .time {
        font-family: "JetBrains Mono", monospace;
        color: var(--accent);
        font-size: 1rem;
      }

      .timer-bar .controls {
        display: flex;
        gap: 0.5rem;
      }

      .timer-bar .btn {
        background: transparent;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 0.9rem;
      }

      .timer-bar .btn:hover { color: var(--fg); }

      .hint {
        position: fixed;
        bottom: 1rem;
        color: var(--muted);
        font-size: 0.7rem;
      }

      .hint kbd {
        background: var(--card);
        padding: 2px 6px;
        border-radius: 3px;
        margin: 0 2px;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }

      .modal-overlay.visible { display: flex; }

      .modal {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        width: 90%;
        max-width: 350px;
      }

      .modal h3 {
        margin-bottom: 1rem;
        color: var(--fg);
      }

      .modal input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--fg);
        padding: 0.6rem;
        border-radius: 6px;
        margin-bottom: 0.8rem;
        font-family: inherit;
        font-size: 0.9rem;
      }

      .modal input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .modal-buttons {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
      }

      .modal .btn {
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }

      .modal .btn-cancel {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
      }

      .modal .btn-save {
        background: var(--accent);
        border: 1px solid var(--accent);
        color: var(--bg);
      }

      .icon-picker {
        max-height: 150px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.5rem;
        margin-bottom: 0.8rem;
        display: none;
        flex-wrap: wrap;
        gap: 0.3rem;
      }

      .icon-picker.visible { display: flex; }

      .icon-picker .icon-option {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        cursor: pointer;
        color: var(--fg);
        font-size: 1.1rem;
      }

      .icon-picker .icon-option:hover {
        background: var(--border);
      }

      .icon-picker .icon-option.selected {
        background: var(--accent);
        color: var(--bg);
      }

      .icon-picker-search {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--fg);
        padding: 0.6rem;
        border-radius: 6px;
        margin-bottom: 0.5rem;
        font-family: inherit;
        font-size: 0.9rem;
      }

      .icon-picker-search:focus {
        outline: none;
        border-color: var(--accent);
      }

      .icon-preview {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.8rem;
      }

      .icon-preview i {
        font-size: 1.5rem;
        color: var(--accent);
      }
    </style>
  </head>

  <body>
    <div class="timer-bar" id="timerBar">
      <span class="time" id="timerTime">25:00</span>
      <span class="label" id="timerLabel" style="color:var(--muted);font-size:0.8rem">Focus</span>
      <div class="controls">
        <button class="btn" id="timerToggle"><i class="bi bi-play-fill"></i></button>
        <button class="btn" id="timerReset"><i class="bi bi-arrow-counterclockwise"></i></button>
        <button class="btn" id="timerSettings"><i class="bi bi-gear"></i></button>
      </div>
    </div>

    <div class="clock" id="clock">00:00</div>
    <div class="date" id="date"></div>
    <div class="weather" id="weather"></div>

    <div class="search-container">
      <input type="text" class="search-input" id="search" placeholder="Search... (s)" autocomplete="off" />
    </div>

    <div class="tabs" id="tabs">
      <button class="add-tab-btn" id="addTabBtn">+</button>
    </div>
    <div class="bookmarks" id="bookmarks"></div>

    <div class="hint"><kbd>s</kbd> Search &nbsp; <kbd>t</kbd> Timer &nbsp; <kbd>,</kbd> Settings &nbsp; <kbd>1-9</kbd> Open &nbsp; <kbd>Del</kbd> Remove</div>

    <div class="modal-overlay" id="addBookmarkModal">
      <div class="modal">
        <h3>Add Bookmark</h3>
        <input type="text" id="bmName" placeholder="Name" />
        <input type="text" id="bmUrl" placeholder="URL (https://...)" />
        <div class="icon-preview">
          <i class="bi bi-link-45deg" id="bmIconPreview"></i>
          <span style="font-size: 0.75rem; color: var(--muted); cursor: pointer;" id="toggleIconPicker">Change icon ▼</span>
        </div>
        <input type="text" class="icon-picker-search" id="iconSearch" placeholder="Search icons..." style="display:none" />
        <div class="icon-picker" id="iconPicker"></div>
        <div class="modal-buttons">
          <button class="btn btn-cancel">Cancel</button>
          <button class="btn btn-save">Save</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="addGroupModal">
      <div class="modal">
        <h3>Add Group</h3>
        <input type="text" id="groupName" placeholder="Group name" />
        <div class="modal-buttons">
          <button class="btn btn-cancel">Cancel</button>
          <button class="btn btn-save">Save</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
      <div class="modal">
        <h3>Settings</h3>
        <input type="text" id="cityInput" placeholder="City name (e.g. London, New York)" />
        <div class="modal-buttons">
          <button class="btn btn-cancel">Cancel</button>
          <button class="btn btn-save">Save</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
